name: Worm
options:
  bundleIdPrefix: com.shibuya
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Worm:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: Worm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shibuya.worm
        INFOPLIST_FILE: Worm/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  WormTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WormTests
    dependencies:
      - target: Worm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shibuya.worm.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Worm.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Worm
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Worm:
    build:
      targets:
        Worm: all
        WormTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WormTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
